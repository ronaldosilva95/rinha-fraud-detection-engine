x-service-templates:
  rinha-fraud-detection-engine: &rinha-fraud-detection-engine
    image: ronaldosilva95/rinha-fraud-detection-engine:v0.0.3-native
    hostname: fraud-detection-api
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 1s
      retries: 3
      start_period: 20s # Time to allow the application to fully start
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 500
        window: 5s
      resources:
        limits:
          cpus: "0.43"
          memory: "165MB"
services:
  nginx:
    image: nginx:1.25-alpine
    container_name: rinha-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
       api-1:
         condition: service_healthy
       api-2:
         condition: service_healthy
    ports:
      - "9999:9999"
    networks:
      - backend-network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 500
        window: 5s
      resources:
        limits:
          cpus: "0.14"
          memory: "20MB"
  api-1:
    <<: *rinha-fraud-detection-engine
    hostname: api01
  api-2:
    <<: *rinha-fraud-detection-engine
    hostname: api02
networks:
  backend-network:
    driver: bridge
